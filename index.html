    <style>
        body { font: 13px sans-serif; color: #fff; padding: 10px; background: url('background.jpg') no-repeat center/cover fixed; margin: 0; }
        .container { max-width: 600px; margin: auto; }
        /* Chữ tiêu đề chính đậm và đổ bóng mạnh */
        h1 { text-align: center; color: #38bdf8; text-transform: uppercase; font-size: 1.2em; font-weight: 900; text-shadow: 2px 2px 4px #000, -1px -1px 0 #000, 1px -1px 0 #000, -1px 1px 0 #000, 1px 1px 0 #000; }
        
        /* BOX TRONG SUỐT HOÀN TOÀN - CHỈ GIỮ VIỀN */
        .card { background: transparent; border-radius: 10px; padding: 12px; margin-bottom: 15px; border: 2px solid rgba(255,255,255,0.4); }
        
        /* Chữ tiêu đề Box tô đậm và viền đen để không bị lẫn vào ảnh nền */
        h2 { font-size: 1em; font-weight: 900; margin: 0; text-transform: uppercase; color: #fff; text-shadow: 2px 2px 2px #000, -1px -1px 0 #000, 1px -1px 0 #000, -1px 1px 0 #000, 1px 1px 0 #000; border-bottom: 1px solid rgba(255,255,255,0.3); padding-bottom: 5px; }
        .jp { font-size: 0.7em; color: #eee; display: block; font-weight: bold; }

        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(120px, 1fr)); gap: 8px; margin-top: 10px; }
        
        /* Nút bấm cũng làm trong suốt nhẹ để thấy nền */
        .btn { text-align: center; padding: 8px 3px; border-radius: 6px; text-decoration: none; color: #fff; font-weight: 900; font-size: 0.75em; display: flex; align-items: center; justify-content: center; min-height: 35px; border: 1px solid rgba(255,255,255,0.3); text-shadow: 1px 1px 2px #000; transition: 0.2s; }
        .btn:hover { filter: brightness(1.2); transform: scale(1.05); border-color: #fff; }

        /* Màu sắc đặc trưng cho viền và chữ trên nút */
        .b-sony { background: rgba(0, 55, 145, 0.7); } 
        .b-nin { background: rgba(230, 0, 18, 0.7); } 
        .b-apple { background: rgba(71, 85, 105, 0.7); } 
        .b-rom { background: rgba(21, 128, 61, 0.7); } 
        .b-cfw { background: rgba(146, 64, 14, 0.7); }

        .counter-box { text-align: center; margin-bottom: 15px; }
        .footer { text-align: center; font-size: 0.8em; font-weight: bold; color: #fff; margin-top: 20px; text-shadow: 1px 1px 3px #000; }
    </style>
</head>
